<!DOCTYPE html>
<html lang="en">

<head>
	<title>Witch Hunt: Apocalipsis Mágico</title>
	<link rel="icon" type="image/png" href="assets/img/favicon.png">

	<meta charset=utf-8 />
	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
	<!-- Bootstrap 5 -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<!-- Icons -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

	<link type="text/css" rel="stylesheet" href="assets/css/main.css">
</head>

<body>
	<!-- NAVBAR -->
	<nav class="navbar navbar-expand-lg navbar-dark">
		<div class="container">

			<a class="navbar-brand fw-bold" href="index.html">
				<i class="bi bi-box"></i>Witch Hunt: Apocalipsis Mágico
			</a>

			<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
				<span class="navbar-toggler-icon"></span>
			</button>

			<div class="collapse navbar-collapse" id="menu">
				<ul class="navbar-nav ms-auto">
					<li class="nav-item">
						<span class="nav-link text-white fw-bold" id="lives">
							❤️ Vidas: 3
						</span>
					</li>
					<li class="nav-item">
						<span class="nav-link text-white fw-bold" id="score">
							🎯 Puntaje: 0
						</span>
					</li>

					<li class="nav-item">
						<span class="nav-link text-white fw-bold" id="ammo">
							🔫 Balas: 7 / 7
						</span>
					</li>
				</ul>
			</div>
		</div>
	</nav>

	<div id="container"></div>

	<div id="pauseMenu" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.7);
    flex-direction: column;
    z-index: 999;
">

		<h1 style="color: white;">⏸ Juego Pausado</h1>

		<button id="btnResume">▶ Continuar</button>
		<button id="btnRestart">🔄 Reiniciar</button>
		<button id="btnSalir">🚪Salir</button>

	</div>

	<div id="gameTerminateMenu" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.7);
    flex-direction: column;
    z-index: 999;
">

		<h1 style="color: white;">FIN DEL JUEGO</h1>
		<button id="btnRestart2">🔄 Reiniciar</button>
		<button id="btnSalir2">🚪Salir</button>

	</div>

	<!-- 🎯 Mira -->
	<div id="crosshair" style="
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
color: rgb(223, 30, 0);
font-size: 20px;
z-index: 100;
pointer-events: none;
">
		+
	</div>

	<script type="importmap">
		{
			"imports": {
				"three": "./assets/build/three.module.js",
				"three/addons/": "./assets/jsm/"
			}
		}
	</script>

	<script type="module" src="assets/js/games_fps.js"></script>

	<!-- Bootstrap JS -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


</body>

</html>
